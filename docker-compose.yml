# ── Ferramentas de banco de dados ─────────────────────────────────────────────
# pgcli (CLI interativa): já incluído em requirements.txt — roda na venv local.
#   Uso: scripts\db.bat  (Windows)  ou  ./scripts/db.sh  (Linux/Mac)
#   Config: copie configs/pgclirc.example → %APPDATA%\pgcli\config
#
# HeidiSQL (GUI, open-source GPL): instalação manual — https://www.heidisql.com/download.php
#   Network type=PostgreSQL TCP/IP | Host=127.0.0.1 | Port=5432 | User=postgres | DB=dinamica_budget
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dinamica_budget
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/dinamica_budget
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/dinamica_budget
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./ml_models:/app/ml_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  pgdata:
